# Nginx configuration for Dynamo WSR Platform
# Place in /etc/nginx/sites-available/dynamo-wsr
# Then: sudo ln -s /etc/nginx/sites-available/dynamo-wsr /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name wsr.dynamobigdata.com;  # Replace with your domain

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name wsr.dynamobigdata.com;  # Replace with your domain

    # SSL configuration (use certbot to generate)
    ssl_certificate /etc/letsencrypt/live/wsr.dynamobigdata.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wsr.dynamobigdata.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy to SvelteKit Node server
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # Static assets — cache aggressively
    location /_app/immutable/ {
        proxy_pass http://127.0.0.1:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
}
